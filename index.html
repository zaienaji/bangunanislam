<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Bangunan Islam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css" />
</head>

<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Bangunan Islam',
      loadSidebar: true,
      homepage: 'bangunan-islam.md',
      relativePath: true,

      // 🔥 Hapus YAML frontmatter dari Obsidian
      plugins: [
        function (hook) {
          hook.beforeEach(function (content) {
            return content.replace(/^---[\s\S]*?---/, '').trim();
          });
        }
      ]
    }
  </script>

  <!-- Docsify Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
